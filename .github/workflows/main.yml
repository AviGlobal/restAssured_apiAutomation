name: Manual Automation Execution

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select branch to run automation'
        required: true
        default: 'main'

jobs:

  automation-run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Selected Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify Branch
        run: |
          echo "Running on branch:"
          git branch --show-current

      - name: Execute Automation
        run: |
          mvn clean test
