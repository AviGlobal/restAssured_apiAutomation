name: Manual Automation Execution on: workflow_dispatch: inputs: branch: description: 'Select branch to execute automation' required: true default: 'main' jobs: automation-run: runs-on: ubuntu-latest steps: # Checkout selected branch - name: Checkout Latest Code uses: actions/checkout@v4 with: ref: ${{ github.event.inputs.branch }} # Setup Java Environment - name: Setup Java uses: actions/setup-java@v4 with: java-version: '17' distribution: 'temurin' cache: maven # Verify checked out branch - name: Verify Branch run: | echo "Running automation on branch:" git branch --show-current # Execute Automation Suite - name: Run Automation Tests run: | mvn clean test # Upload Reports - name: Upload Test Reports if: always() uses: actions/upload-artifact@v4 with: name: Automation-Test-Report path: target/
