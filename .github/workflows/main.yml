name: API Automation Execution

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select branch'
        required: true
        default: 'main'

jobs:

  api-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven


      - name: Run ReqRes API Automation
        run: |
          mvn clean test -Dtest=ReqResAutomation.*


      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: API-Automation-Report
          path: target/
